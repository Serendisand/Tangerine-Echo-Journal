name: 自动更新文件名和文章列表

on:
  push:
    paths:
      - 'docs/**/*.md'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  update-filenames-and-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: 重命名所有 .md 文件
        run: |
          cd docs
          
          echo "📂 当前目录: $(pwd)"
          echo "📄 文件列表:"
          ls -la *.md 2>/dev/null || echo "没有 .md 文件"
          
          # 处理每个 .md 文件
          for old_file in *.md; do
            [ -f "$old_file" ] || continue
            
            echo "🔄 处理: $old_file"
            
            # 获取最后修改日期
            last_date=$(git log -1 --format=%as -- "$old_file" 2>/dev/null || true)
            
            if [ -z "$last_date" ]; then
              last_date=$(date +%Y-%m-%d)
              echo "  📅 使用当前日期: $last_date"
            else
              echo "  📅 最后修改日期: $last_date"
            fi
            
            base_name="${old_file%.md}"
            
            # 检查是否已包含日期
            if echo "$base_name" | grep -q "_$last_date$"; then
              echo "  ⏭️  已包含日期，跳过"
              continue
            fi
            
            # 移除旧日期后缀
            clean_name=$(echo "$base_name" | sed 's/_[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}$//')
            new_file="${clean_name}_${last_date}.md"
            
            if [ "$old_file" != "$new_file" ]; then
              if [ -f "$new_file" ]; then
                echo "  ⚠️  目标文件已存在，跳过"
                continue
              fi
              
              mv "$old_file" "$new_file"
              echo "  ✅ 重命名: $old_file → $new_file"
            fi
          done
          
          echo "📂 处理后的文件:"
          ls -la *.md 2>/dev/null || echo "没有 .md 文件"

      - name: 生成 list.txt
        run: |
          cd docs
          
          echo "📝 生成 list.txt"
          
          # 清空并生成列表（按文件名排序）
          ls -1 *.md 2>/dev/null | sort > list.txt
          
          echo "📄 list.txt 内容:"
          cat list.txt

      - name: 检查变更
        id: check
        run: |
          cd docs
          
          # 添加所有变更
          git add -A docs/
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ 无变更需要提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📋 有以下变更："
            git status --short
            git diff --cached --stat
          fi

      - name: 提交变更
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: 自动更新文件名和文章列表 [skip ci]"
          git push
