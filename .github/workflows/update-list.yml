name: 自动更新文件名和文章列表

on:
  push:
    paths:
      - 'docs/**/*.md'  # 确保路径正确
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  update-filenames-and-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write  # 添加这个权限
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}  # 添加token

      - name: 重命名所有 .md 文件
        run: |
          cd docs || exit 1
          
          # 使用find递归查找所有.md文件
          find . -name "*.md" -type f | while read -r old_file; do
            # 跳过当前目录下的list.txt
            [[ "$old_file" == "./list.txt" ]] && continue
            
            # 获取文件的最后commit日期
            last_date=$(git log -1 --format=%as -- "$old_file" 2>/dev/null)
            
            if [ -z "$last_date" ]; then
              last_date=$(date +%Y-%m-%d)
            fi
            
            # 获取文件名（不含路径）
            filename=$(basename "$old_file")
            dirname=$(dirname "$old_file")
            base_name="${filename%.md}"
            
            # 检查是否已包含日期
            if echo "$base_name" | grep -q "_$last_date$"; then
              echo "⏭️  $old_file 已包含日期 $last_date，跳过"
              continue
            fi
            
            # 移除已有的日期后缀
            clean_name=$(echo "$base_name" | sed 's/_[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}$//')
            
            new_file="${dirname}/${clean_name}_${last_date}.md"
            
            # 使用mv代替git mv避免冲突
            if [ "$old_file" != "$new_file" ]; then
              mv "$old_file" "$new_file"
              echo "✅ 重命名: $old_file → $new_file"
            fi
          done

      - name: 生成 list.txt
        run: |
          cd docs
          # 使用find查找所有.md文件并排序
          find . -name "*.md" -type f | sort > list.txt
          echo "已生成 list.txt："
          cat list.txt

      - name: 检查并提交变更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有变更
          git add docs/
          
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "无变更需要提交"
          else
            git commit -m "chore: 自动更新文件名（添加最后修改日期） [skip ci]"
            git push
          fi
