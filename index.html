<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
    <title>柑音手账</title>
    <link rel="icon" type="image/png" href="icon/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        :root {
            --paper: #fffdf7;
            --paper-soft: #f8fbf3;
            --mint: #9fd7c2;
            --mint-deep: #4f9f86;
            --peach: #ffd8bd;
            --apricot: #ffad82;
            --ink: #273b35;
            --muted: #71877f;
            --line: rgba(107, 151, 134, 0.2);
            --shadow: 0 24px 70px rgba(50, 92, 77, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: 'Segoe UI', 'Noto Sans CJK SC', 'Noto Sans CJK JP', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            line-height: 1.7;
            background:
                radial-gradient(circle at 12% 12%, rgba(159, 215, 194, 0.28), transparent 32vw),
                radial-gradient(circle at 88% 18%, rgba(255, 216, 189, 0.35), transparent 30vw),
                linear-gradient(180deg, #f7fbf0 0%, #fff8ef 48%, #f7fbf0 100%);
            overflow-x: hidden;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .hero-section {
            position: relative;
            min-height: 100svh;
            background-image: url('https://uapis.cn/api/v1/random/image?category=acg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #eef8f1;
            display: grid;
            place-items: end center;
            isolation: isolate;
        }

        .hero-section::before,
        .hero-section::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            filter: blur(2px);
            opacity: 0.65;
            pointer-events: none;
            z-index: -1;
        }

        .hero-section::before {
            width: min(36vw, 420px);
            height: min(36vw, 420px);
            left: 8vw;
            bottom: 14vh;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.44), transparent 64%);
        }

        .hero-section::after {
            width: min(28vw, 320px);
            height: min(28vw, 320px);
            right: 10vw;
            top: 12vh;
            background: radial-gradient(circle, rgba(159, 215, 194, 0.34), transparent 66%);
        }

        .hero-logo {
            position: absolute;
            top: clamp(1.1rem, 3vw, 2rem);
            left: clamp(1.1rem, 3vw, 2.4rem);
            z-index: 2;
            color: #273b35;
            font-size: clamp(1.35rem, 2.6vw, 2.2rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            text-shadow: 0 2px 14px rgba(255, 255, 255, 0.72);
        }

        .scroll-cue {
            margin-bottom: clamp(2rem, 7vh, 5rem);
            width: 52px;
            height: 52px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: rgba(39, 59, 53, 0.74);
            background: rgba(255, 253, 247, 0.56);
            border: 1px solid rgba(255, 255, 255, 0.64);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-decoration: none;
            box-shadow: 0 18px 40px rgba(50, 92, 77, 0.14);
            animation: floatCue 2.4s ease-in-out infinite;
        }

        .scroll-cue span {
            display: block;
            font-size: 1.7rem;
            line-height: 1;
            transform: translateY(-2px);
        }

        @keyframes floatCue {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(8px);
            }
        }

        .journal-shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: clamp(3.6rem, 8vw, 7rem) 0 4rem;
        }

        .section-head {
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 1.4rem;
        }

        .eyebrow {
            color: var(--mint-deep);
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 0.55rem;
        }

        .section-title {
            font-size: clamp(2.1rem, 5vw, 4rem);
            line-height: 1.06;
            letter-spacing: -0.05em;
            color: #233a33;
        }

        .section-note {
            color: var(--muted);
            margin-top: 0.85rem;
            max-width: 560px;
        }

        .count-pill {
            min-width: 104px;
            border-radius: 999px;
            padding: 0.75rem 1.05rem;
            color: var(--mint-deep);
            background: rgba(255, 253, 247, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.78);
            box-shadow: 0 14px 36px rgba(50, 92, 77, 0.08);
            text-align: center;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            font-weight: 800;
        }

        .toolbar {
            position: sticky;
            top: 1rem;
            z-index: 10;
            display: grid;
            grid-template-columns: minmax(220px, 340px) minmax(0, 1fr);
            gap: 0.9rem;
            align-items: center;
            padding: 0.72rem;
            margin-bottom: 1.3rem;
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 32px;
            background: rgba(255, 253, 247, 0.72);
            box-shadow: 0 18px 56px rgba(50, 92, 77, 0.09);
            backdrop-filter: blur(18px) saturate(1.08);
            -webkit-backdrop-filter: blur(18px) saturate(1.08);
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            min-height: 46px;
            border-radius: 999px;
            padding: 0 1rem;
            background: rgba(248, 251, 243, 0.9);
            border: 1px solid var(--line);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-wrap:focus-within {
            border-color: rgba(79, 159, 134, 0.5);
            box-shadow: 0 0 0 4px rgba(159, 215, 194, 0.18);
        }

        .search-icon {
            opacity: 0.7;
        }

        .search-wrap input {
            width: 100%;
            color: var(--ink);
            background: transparent;
            border: 0;
            outline: 0;
            font-size: 0.95rem;
        }

        .tag-strip {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.45rem;
            min-width: 0;
        }

        .tag-nav {
            cursor: pointer;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            color: var(--mint-deep);
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(107, 151, 134, 0.2);
            box-shadow: 0 10px 22px rgba(50, 92, 77, 0.08);
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .tag-nav:hover {
            transform: translateY(-2px);
            color: #fff;
            background: var(--mint-deep);
        }

        .tag-scroll {
            display: flex;
            gap: 0.55rem;
            overflow-x: auto;
            padding: 0.15rem;
            scrollbar-width: none;
        }

        .tag-scroll::-webkit-scrollbar {
            display: none;
        }

        .tag-chip,
        .post-tag {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            border-radius: 999px;
            font-weight: 700;
        }

        .tag-chip {
            cursor: pointer;
            color: #527269;
            padding: 0.58rem 0.9rem;
            background: rgba(255, 255, 255, 0.56);
            border: 1px solid rgba(107, 151, 134, 0.18);
            transition: transform 0.2s ease, color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .tag-chip:hover {
            transform: translateY(-2px);
            color: var(--mint-deep);
            background: rgba(245, 255, 249, 0.88);
        }

        .tag-chip.active-tag {
            color: #fff;
            background: linear-gradient(135deg, var(--mint-deep), #7fcdb0);
            border-color: transparent;
            box-shadow: 0 12px 26px rgba(79, 159, 134, 0.24);
        }

        .loading-area,
        .empty-area {
            margin-top: 2rem;
            border-radius: 36px;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 253, 247, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.76);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .spinner {
            display: inline-block;
            width: 46px;
            height: 46px;
            border: 4px solid rgba(159, 215, 194, 0.28);
            border-top-color: var(--mint-deep);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .post-list {
            display: grid;
            gap: 0.9rem;
        }

        .post-item {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            align-items: center;
            gap: 1rem;
            width: 100%;
            text-align: left;
            cursor: pointer;
            padding: clamp(1.15rem, 2.4vw, 1.65rem);
            color: inherit;
            border-radius: 30px;
            background: rgba(255, 253, 247, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.78);
            box-shadow: 0 18px 46px rgba(50, 92, 77, 0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            overflow: hidden;
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease, background 0.24s ease;
        }

        .post-item::before {
            content: '';
            position: absolute;
            inset: 0 auto 0 0;
            width: 5px;
            background: linear-gradient(180deg, var(--mint), var(--peach));
            opacity: 0;
            transition: opacity 0.24s ease;
        }

        .post-item:hover,
        .post-item:focus-visible {
            transform: translateY(-4px);
            border-color: rgba(159, 215, 194, 0.56);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 26px 64px rgba(50, 92, 77, 0.13);
            outline: 0;
        }

        .post-item:hover::before,
        .post-item:focus-visible::before {
            opacity: 1;
        }

        .post-title {
            font-size: clamp(1.22rem, 2.4vw, 1.75rem);
            line-height: 1.28;
            letter-spacing: -0.03em;
            color: #263d36;
            margin-bottom: 0.45rem;
            word-break: break-word;
        }

        .post-date,
        .reader-date {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: #6d8980;
            font-size: 0.84rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }

        .post-tag {
            color: #5a8176;
            font-size: 0.78rem;
            padding: 0.25rem 0.72rem;
            background: rgba(159, 215, 194, 0.18);
            border: 1px solid rgba(79, 159, 134, 0.15);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.55rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .page-btn {
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 999px;
            color: #527269;
            background: rgba(255, 253, 247, 0.74);
            border: 1px solid rgba(107, 151, 134, 0.2);
            box-shadow: 0 10px 22px rgba(50, 92, 77, 0.07);
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .page-btn:hover {
            transform: translateY(-2px);
            background: rgba(245, 255, 249, 0.92);
        }

        .page-btn.active-page {
            color: #fff;
            background: var(--mint-deep);
        }

        .page-btn:disabled {
            opacity: 0.42;
            cursor: default;
            pointer-events: none;
        }

        .friend-section {
            position: relative;
            margin-top: clamp(3rem, 7vw, 5.4rem);
            overflow: hidden;
            border-radius: clamp(30px, 4vw, 46px);
            padding: clamp(1.35rem, 3vw, 2rem);
            background:
                radial-gradient(circle at 14% 12%, rgba(159, 215, 194, 0.26), transparent 34%),
                radial-gradient(circle at 86% 0%, rgba(255, 216, 189, 0.34), transparent 38%),
                rgba(255, 253, 247, 0.74);
            border: 1px solid rgba(255, 255, 255, 0.82);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px) saturate(1.05);
            -webkit-backdrop-filter: blur(18px) saturate(1.05);
        }

        .friend-section::before {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            border: 1px solid rgba(255, 255, 255, 0.62);
            pointer-events: none;
        }

        .friend-head {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 1rem;
            margin-bottom: 1.35rem;
        }

        .friend-note {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 0.45rem;
        }

        .friend-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 86px;
            min-height: 38px;
            border-radius: 999px;
            color: var(--mint-deep);
            background: rgba(255, 255, 255, 0.66);
            border: 1px solid rgba(107, 151, 134, 0.18);
            font-weight: 800;
            box-shadow: 0 12px 28px rgba(50, 92, 77, 0.08);
        }

        .friend-marquee {
            position: relative;
            display: grid;
            gap: 0.8rem;
            padding: 0.15rem 0;
            overflow: hidden;
            mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
            -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
        }

        .friend-row {
            min-width: 0;
            overflow-x: auto;
            overscroll-behavior-inline: contain;
            scrollbar-width: none;
        }

        .friend-row::-webkit-scrollbar {
            display: none;
        }

        .friend-track {
            display: flex;
            width: max-content;
            gap: 0.8rem;
            padding: 0.15rem 0.1rem 0.3rem;
        }

        .friend-row:nth-child(2) .friend-track {
            transform: translateX(clamp(-72px, -5vw, 0px));
        }

        .friend-row:nth-child(3) .friend-track {
            transform: translateX(clamp(-36px, -3vw, 0px));
        }

        .friend-card {
            position: relative;
            display: grid;
            grid-template-columns: 52px minmax(120px, 1fr) auto;
            align-items: center;
            gap: 0.85rem;
            min-width: clamp(238px, 25vw, 314px);
            padding: 0.8rem 0.95rem;
            color: #274139;
            text-decoration: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.78);
            box-shadow: 0 16px 38px rgba(50, 92, 77, 0.09);
            overflow: hidden;
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease, background 0.24s ease;
        }

        .friend-card::after {
            content: '';
            position: absolute;
            inset: auto 14px 10px 14px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--mint), var(--peach));
            opacity: 0;
            transform: scaleX(0.7);
            transition: opacity 0.24s ease, transform 0.24s ease;
        }

        .friend-card:hover,
        .friend-card:focus-visible {
            transform: translateY(-4px) scale(1.015);
            border-color: rgba(159, 215, 194, 0.58);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 24px 52px rgba(50, 92, 77, 0.14);
            outline: 0;
        }

        .friend-card:hover::after,
        .friend-card:focus-visible::after {
            opacity: 1;
            transform: scaleX(1);
        }

        .friend-icon {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(159, 215, 194, 0.34), rgba(255, 216, 189, 0.5));
            border: 1px solid rgba(255, 255, 255, 0.82);
            box-shadow: 0 10px 24px rgba(50, 92, 77, 0.12);
        }

        .friend-name {
            display: block;
            overflow: hidden;
            color: #243d35;
            font-size: 1rem;
            font-weight: 900;
            line-height: 1.2;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-url {
            display: block;
            overflow: hidden;
            color: #789189;
            font-size: 0.76rem;
            font-weight: 700;
            line-height: 1.45;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-arrow {
            display: grid;
            place-items: center;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            color: var(--mint-deep);
            background: rgba(159, 215, 194, 0.16);
            transition: transform 0.24s ease, color 0.24s ease, background 0.24s ease;
        }

        .friend-card:hover .friend-arrow,
        .friend-card:focus-visible .friend-arrow {
            transform: translateX(2px);
            color: #fff;
            background: var(--mint-deep);
        }

        .reader-view {
            animation: readerIn 0.34s ease both;
        }

        @keyframes readerIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            margin-bottom: 1rem;
            padding: 0.62rem 1rem;
            color: var(--mint-deep);
            background: rgba(255, 253, 247, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.78);
            border-radius: 999px;
            box-shadow: 0 12px 28px rgba(50, 92, 77, 0.08);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .back-btn:hover {
            transform: translateX(-3px);
            background: rgba(255, 255, 255, 0.94);
        }

        .reader-card {
            overflow: hidden;
            border-radius: clamp(28px, 4vw, 48px);
            background: rgba(255, 253, 247, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.82);
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .reader-header {
            padding: clamp(1.6rem, 5vw, 3.2rem) clamp(1.35rem, 5vw, 4rem) 1.1rem;
        }

        .reader-title {
            font-size: clamp(2rem, 5vw, 4.2rem);
            line-height: 1.08;
            letter-spacing: -0.06em;
            color: #203830;
            margin: 0.7rem 0 1rem;
        }

        .featured-image {
            display: block;
            width: calc(100% - clamp(2rem, 7vw, 6rem));
            max-height: min(68vh, 680px);
            object-fit: cover;
            margin: 0 auto clamp(1rem, 4vw, 2rem);
            border-radius: clamp(24px, 3.4vw, 40px);
            box-shadow: 0 26px 62px rgba(50, 92, 77, 0.16);
            cursor: zoom-in;
        }

        .article-body {
            padding: 0 clamp(1.35rem, 5vw, 4rem) clamp(2.2rem, 6vw, 4.4rem);
            color: #30423d;
            font-size: clamp(1rem, 1.5vw, 1.08rem);
        }

        .article-body > *:first-child {
            margin-top: 0;
        }

        .article-body h1,
        .article-body h2,
        .article-body h3 {
            color: #2e6658;
            line-height: 1.25;
            margin: 1.8em 0 0.72em;
            letter-spacing: -0.03em;
        }

        .article-body h1 {
            font-size: 2rem;
        }

        .article-body h2 {
            font-size: 1.58rem;
        }

        .article-body h3 {
            font-size: 1.28rem;
        }

        .article-body p,
        .article-body ul,
        .article-body ol,
        .article-body blockquote,
        .article-body pre,
        .article-body table {
            margin-bottom: 1.05rem;
        }

        .article-body ul,
        .article-body ol {
            padding-left: 1.35rem;
        }

        .article-body a {
            color: #3c9d83;
            text-decoration: none;
            border-bottom: 1px dashed rgba(60, 157, 131, 0.45);
        }

        .article-body a:hover {
            color: #287762;
        }

        .article-body img {
            display: block;
            max-width: min(100%, 760px);
            height: auto;
            margin: 1.6rem auto;
            border-radius: 28px;
            box-shadow: 0 18px 44px rgba(50, 92, 77, 0.13);
            cursor: zoom-in;
        }

        .article-body blockquote {
            border-left: 5px solid var(--mint);
            background: rgba(159, 215, 194, 0.13);
            padding: 1rem 1.25rem;
            border-radius: 0 22px 22px 0;
            color: #4c665e;
        }

        .article-body code {
            color: #bd6846;
            background: rgba(255, 216, 189, 0.32);
            border-radius: 10px;
            padding: 0.16rem 0.38rem;
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            font-size: 0.92em;
        }

        .article-body pre {
            overflow-x: auto;
            padding: 1rem;
            border-radius: 24px;
            background: #25332f;
        }

        .article-body pre code {
            color: #edf7f0;
            background: transparent;
            padding: 0;
        }

        .article-body table {
            display: block;
            width: 100%;
            overflow-x: auto;
            border-collapse: collapse;
        }

        .article-body th,
        .article-body td {
            padding: 0.6rem 0.75rem;
            border: 1px solid rgba(107, 151, 134, 0.22);
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            background: rgba(12, 26, 22, 0.84);
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 90vh;
            border-radius: 28px;
            box-shadow: 0 26px 76px rgba(0, 0, 0, 0.38);
            cursor: default;
        }

        footer {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 0 0 2.2rem;
            color: rgba(82, 114, 105, 0.72);
            text-align: center;
            font-size: 0.88rem;
        }

        @media (max-width: 780px) {
            .journal-shell {
                width: min(100% - 22px, 1120px);
                padding-top: 3rem;
            }

            .section-head,
            .toolbar {
                grid-template-columns: 1fr;
            }

            .post-item {
                grid-template-columns: 1fr;
            }

            .friend-head {
                grid-template-columns: 1fr;
            }

            .friend-count {
                justify-self: start;
            }

            .friend-card {
                grid-template-columns: 46px minmax(112px, 1fr) auto;
                min-width: 230px;
                border-radius: 22px;
            }

            .friend-icon {
                width: 46px;
                height: 46px;
                border-radius: 16px;
            }

            .section-head {
                grid-template-columns: 1fr;
            }

            .section-head {
                gap: 1rem;
            }

            .count-pill {
                justify-self: start;
            }

            .toolbar {
                position: relative;
                top: auto;
                border-radius: 26px;
            }

            .reader-header {
                padding-bottom: 0.75rem;
            }

            .featured-image {
                width: calc(100% - 1.6rem);
                border-radius: 24px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>
    <section class="hero-section" aria-label="纯图片首页封面">
        <div class="hero-logo">柑音手账</div>
        <a class="scroll-cue" href="#journal" aria-label="下拉查看文章"><span>⌄</span></a>
    </section>

    <div id="app">
        <main id="journal" class="journal-shell">
            <div v-if="loading" class="loading-area">
                <div class="spinner"></div>
                <div style="margin-top:1.2rem;">正在吹开清新的书页……</div>
            </div>

            <div v-else-if="error" class="empty-area">
                {{ error }}
            </div>

            <template v-else>
                <section v-if="!activePost" class="list-view" aria-label="文章列表">
                    <div class="section-head">
                        <div>
                            <div class="eyebrow">Tangerine Echo Journal</div>
                            <h1 class="section-title">柑音手帐</h1>
                        </div>
                        <div class="count-pill">{{ filteredPosts.length }} 篇</div>
                    </div>

                    <div class="toolbar">
                        <label class="search-wrap">
                            <span class="search-icon">⌕</span>
                            <input type="text" v-model="searchQuery" placeholder="搜索标题或标签" />
                        </label>

                        <div class="tag-strip" v-if="sortedTagsWithCount.length" aria-label="标签筛选">
                            <button class="tag-nav" @click="scrollTags(-1)" aria-label="向左滑动标签">‹</button>
                            <div class="tag-scroll" ref="tagScroller">
                                <button
                                    class="tag-chip"
                                    :class="{ 'active-tag': selectedTag === null }"
                                    @click="selectTag(null)"
                                >全部</button>
                                <button
                                    class="tag-chip"
                                    v-for="tag in sortedTagsWithCount"
                                    :key="tag.name"
                                    :class="{ 'active-tag': selectedTag === tag.name }"
                                    @click="selectTag(tag.name)"
                                    :title="tag.name"
                                >{{ tag.name }} · {{ tag.count }}</button>
                            </div>
                            <button class="tag-nav" @click="scrollTags(1)" aria-label="向右滑动标签">›</button>
                        </div>
                    </div>

                    <div v-if="filteredPosts.length === 0" class="empty-area">
                        没有找到对应文章，换个关键词试试吧。
                    </div>

                    <div v-else class="post-list">
                        <button
                            class="post-item"
                            v-for="post in paginatedPosts"
                            :key="post.fileName"
                            @click="openPost(post)"
                        >
                            <span>
                                <h2 class="post-title">{{ post.title }}</h2>
                                <time class="post-date" v-if="post.date" :datetime="post.isoDate">{{ post.date }}</time>
                                <span class="post-tags" v-if="post.tags && post.tags.length">
                                    <span class="post-tag" v-for="tag in post.tags" :key="tag"># {{ tag }}</span>
                                </span>
                            </span>                        </button>
                    </div>

                    <div class="pagination" v-if="totalPages > 1">
                        <button class="page-btn" :disabled="currentPage <= 1" @click="currentPage = 1">«</button>
                        <button class="page-btn" :disabled="currentPage <= 1" @click="currentPage--">‹</button>
                        <button
                            class="page-btn"
                            v-for="page in visiblePages"
                            :key="page"
                            :class="{ 'active-page': page === currentPage }"
                            @click="currentPage = page"
                        >{{ page }}</button>
                        <button class="page-btn" :disabled="currentPage >= totalPages" @click="currentPage++">›</button>
                        <button class="page-btn" :disabled="currentPage >= totalPages" @click="currentPage = totalPages">»</button>
                    </div>

                    <section class="friend-section" v-if="friends.length" aria-label="友情链接">
                        <div class="friend-head">
                            <div>
                                <div class="eyebrow">Friends</div>
                                <h2 class="section-title">友链</h2>
                                <p class="friend-note">把喜欢的站点收进风里，路过时轻轻打个招呼。</p>
                            </div>
                            <div class="friend-count">{{ friends.length }} 位</div>
                        </div>

                        <div class="friend-marquee">
                            <div class="friend-row" v-for="(row, rowIndex) in friendRows" :key="rowIndex">
                                <div class="friend-track">
                                    <a
                                        class="friend-card"
                                        v-for="(friend, index) in row"
                                        :key="`${rowIndex}-${index}-${friend.url}`"
                                        :href="friend.url"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        :title="friend.name"
                                    >
                                        <img class="friend-icon" :src="friend.icon" :alt="`${friend.name} 图标`" loading="lazy" />
                                        <span>
                                            <span class="friend-name">{{ friend.name }}</span>
                                            <span class="friend-url">{{ friend.host }}</span>
                                        </span>
                                        <span class="friend-arrow" aria-hidden="true">↗</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>
                </section>

                <section v-else id="reader" class="reader-view" aria-label="文章正文">
                    <button class="back-btn" @click="closePost">← 返回文章列表</button>

                    <article class="reader-card">
                        <header class="reader-header">
                            <div class="eyebrow">Reading</div>
                            <h1 class="reader-title">{{ activePost.title }}</h1>
                            <time class="reader-date" v-if="activePost.date" :datetime="activePost.isoDate">{{ activePost.date }}</time>
                            <div class="post-tags" v-if="activePost.tags && activePost.tags.length">
                                <span class="post-tag" v-for="tag in activePost.tags" :key="tag"># {{ tag }}</span>
                            </div>
                        </header>

                        <img
                            v-if="activePost.featuredImage"
                            class="featured-image"
                            :src="activePost.featuredImage.src"
                            :alt="activePost.featuredImage.alt || activePost.title"
                        />

                        <div class="article-body" v-html="activePost.html"></div>
                    </article>
                </section>
            </template>

            <div class="lightbox" v-if="lightboxImg" @click="lightboxImg = null">
                <img :src="lightboxImg" @click.stop />
            </div>
        </main>
    </div>

    <footer>柑音手账</footer>

    <script>
        const { createApp, ref, computed, onMounted, nextTick, watch } = Vue;
        const FETCH_TIMEOUT_MS = 12000;
        const CACHE_PREFIX = 'tangerine-echo-journal:';
        const CACHE_MAX_AGE = 24 * 60 * 60 * 1000;

        createApp({
            setup() {
                const loading = ref(true);
                const error = ref('');
                const posts = ref([]);
                const friends = ref([]);
                const searchQuery = ref('');
                const selectedTag = ref(null);
                const currentPage = ref(1);
                const activePost = ref(null);
                const lightboxImg = ref(null);
                const tagScroller = ref(null);
                const postsPerPage = 8;

                function getBaseFolder() {
                    const path = window.location.pathname;

                    if (path.endsWith('/')) return path;
                    if (path.endsWith('.html')) {
                        const lastSlash = path.lastIndexOf('/');
                        return path.substring(0, lastSlash + 1);
                    }

                    return `${path}/`;
                }

                function getAssetUrl(relativePath) {
                    const baseUrl = `${window.location.origin}${getBaseFolder()}`;
                    return new URL(relativePath, baseUrl).href;
                }

                function getDocUrl(fileName) {
                    const encodedFileName = fileName
                        .split('/')
                        .map(part => encodeURIComponent(part))
                        .join('/');

                    return getAssetUrl(`docs/${encodedFileName}`);
                }

                function getFriendListUrl() {
                    return getAssetUrl('friends.txt');
                }

                function getDisplayHost(url) {
                    try {
                        return new URL(url).hostname.replace(/^www\./, '');
                    } catch (err) {
                        return url;
                    }
                }

                function normalizeFriendUrl(url) {
                    if (/^https?:\/\//i.test(url)) return url;
                    return `https://${url}`;
                }

                function parseFriends(text) {
                    return text
                        .split(/\r?\n/)
                        .map(line => line.trim())
                        .filter(line => line && !line.startsWith('#'))
                        .map(line => {
                            const parts = line.split(/\s+/);
                            if (parts.length < 3) return null;

                            const [name, icon, rawUrl] = parts;
                            const url = normalizeFriendUrl(rawUrl);

                            return {
                                name,
                                icon,
                                url,
                                host: getDisplayHost(url)
                            };
                        })
                        .filter(Boolean);
                }

                async function fetchFriends() {
                    try {
                        const text = await fetchText(getFriendListUrl(), '未找到 friends.txt');
                        return parseFriends(text);
                    } catch (err) {
                        console.warn('读取友链失败:', err);
                        return [];
                    }
                }

                function splitFriendRows(list) {
                    if (!list.length) return [];

                    const rows = [[], [], []];

                    list.forEach((friend, index) => {
                        rows[index % 3].push(friend);
                    });

                    return rows.filter(row => row.length);
                }

                function resolvePostAssetUrl(src, fileName) {
                    if (!src) return '';
                    const trimmed = src.trim().replace(/^<|>$/g, '');

                    if (/^(https?:)?\/\//i.test(trimmed) || /^(data|blob):/i.test(trimmed)) {
                        return trimmed;
                    }

                    if (trimmed.startsWith('/')) {
                        return new URL(trimmed, window.location.origin).href;
                    }

                    return new URL(trimmed, getDocUrl(fileName)).href;
                }

                function getCacheKey(url) {
                    return `${CACHE_PREFIX}${url}`;
                }

                function readTextCache(cacheKey) {
                    try {
                        const raw = localStorage.getItem(cacheKey);
                        if (!raw) return null;

                        const cached = JSON.parse(raw);
                        if (!cached || typeof cached.text !== 'string' || !cached.savedAt) return null;

                        if (Date.now() - cached.savedAt > CACHE_MAX_AGE) {
                            localStorage.removeItem(cacheKey);
                            return null;
                        }

                        return cached.text;
                    } catch (err) {
                        return null;
                    }
                }

                function writeTextCache(cacheKey, text) {
                    try {
                        localStorage.setItem(cacheKey, JSON.stringify({
                            text,
                            savedAt: Date.now()
                        }));
                    } catch (err) {
                    }
                }

                async function fetchText(url, errorMessage) {
                    const cacheKey = getCacheKey(url);
                    const cachedText = readTextCache(cacheKey);
                    const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
                    const timeoutId = controller
                        ? window.setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS)
                        : null;

                    try {
                        const res = await fetch(url, {
                            cache: 'no-cache',
                            signal: controller ? controller.signal : undefined
                        });

                        if (!res.ok) {
                            throw new Error(errorMessage || `请求失败：${res.status}`);
                        }

                        const text = await res.text();
                        writeTextCache(cacheKey, text);
                        return text;
                    } catch (err) {
                        if (cachedText !== null) {
                            console.warn(`读取 ${url} 失败，使用本地缓存:`, err);
                            return cachedText;
                        }

                        if (err.name === 'AbortError') {
                            throw new Error(`${errorMessage || '请求超时'}（超过 ${FETCH_TIMEOUT_MS / 1000} 秒）`);
                        }

                        throw err;
                    } finally {
                        if (timeoutId !== null) {
                            window.clearTimeout(timeoutId);
                        }
                    }
                }

                function escapeHtml(str) {
                    if (!str) return '';

                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }

                function extractTitleFromMarkdown(mdContent) {
                    const lines = mdContent.split(/\r?\n/);

                    for (let line of lines) {
                        if (line.startsWith('# ')) {
                            return line.substring(2).trim();
                        }
                    }

                    return null;
                }

                function parseTagsFromMarkdown(mdContent) {
                    const firstLine = mdContent.split(/\r?\n/)[0] || '';
                    const match = firstLine.match(/^tag:\s*(.+)/i);

                    if (!match) return [];

                    return match[1]
                        .split(/[,，]/)
                        .map(t => t.trim())
                        .filter(Boolean);
                }

                function formatDateFromFilename(filename) {
                    const match = filename.match(/_(\d{4})-(\d{2})-(\d{2})\.md$/);

                    if (match) {
                        const isoDate = `${match[1]}-${match[2]}-${match[3]}`;
                        return {
                            display: `${match[1]}年${match[2]}月${match[3]}日`,
                            isoDate,
                            timestamp: new Date(
                                parseInt(match[1]),
                                parseInt(match[2]) - 1,
                                parseInt(match[3])
                            ).getTime()
                        };
                    }

                    const fallbackMatch = filename.match(/(\d{4})-(\d{2})-(\d{2})/);

                    if (fallbackMatch) {
                        const isoDate = `${fallbackMatch[1]}-${fallbackMatch[2]}-${fallbackMatch[3]}`;
                        return {
                            display: `${fallbackMatch[1]}年${fallbackMatch[2]}月${fallbackMatch[3]}日`,
                            isoDate,
                            timestamp: new Date(
                                parseInt(fallbackMatch[1]),
                                parseInt(fallbackMatch[2]) - 1,
                                parseInt(fallbackMatch[3])
                            ).getTime()
                        };
                    }

                    const now = Date.now();
                    return {
                        display: '',
                        isoDate: '',
                        timestamp: now
                    };
                }

                function stripTagLine(mdContent) {
                    const lines = mdContent.split(/\r?\n/);

                    if (lines[0] && /^tag:\s*.+/i.test(lines[0])) {
                        return lines.slice(1).join('\n');
                    }

                    return mdContent;
                }

                function extractFirstImage(mdContent, fileName) {
                    const markdownImage = mdContent.match(/!\[([^\]]*)\]\(([^\)]+)\)/);

                    if (markdownImage) {
                        const srcPart = markdownImage[2].trim().split(/\s+["']/)[0];
                        return {
                            raw: markdownImage[0],
                            alt: markdownImage[1],
                            src: resolvePostAssetUrl(srcPart, fileName)
                        };
                    }

                    const htmlImage = mdContent.match(/<img\b[^>]*\bsrc=["']([^"']+)["'][^>]*>/i);

                    if (htmlImage) {
                        const altMatch = htmlImage[0].match(/\balt=["']([^"']*)["']/i);
                        return {
                            raw: htmlImage[0],
                            alt: altMatch ? altMatch[1] : '',
                            src: resolvePostAssetUrl(htmlImage[1], fileName)
                        };
                    }

                    return null;
                }

                function normalizeRenderedHtml(html, fileName) {
                    if (typeof DOMParser === 'undefined') return html;

                    const doc = new DOMParser().parseFromString(html, 'text/html');
                    doc.querySelectorAll('img[src]').forEach(img => {
                        img.setAttribute('src', resolvePostAssetUrl(img.getAttribute('src'), fileName));
                        img.setAttribute('loading', 'lazy');
                    });

                    doc.querySelectorAll('a[href]').forEach(link => {
                        const href = link.getAttribute('href');
                        if (/^https?:\/\//i.test(href)) {
                            link.setAttribute('target', '_blank');
                            link.setAttribute('rel', 'noopener noreferrer');
                        }
                    });

                    return doc.body.innerHTML;
                }

                async function renderMarkdown(markdown, fileName) {
                    if (typeof marked !== 'undefined') {
                        let html = marked.parse(markdown);

                        if (html instanceof Promise) {
                            html = await html;
                        }

                        return normalizeRenderedHtml(html, fileName);
                    }

                    return `<pre>${escapeHtml(markdown.substring(0, 500))}</pre>`;
                }

                async function loadMarkdownAndRender(fileName) {
                    const url = getDocUrl(fileName);
                    const md = await fetchText(url, `无法加载 ${fileName}`);

                    let title = extractTitleFromMarkdown(md);

                    if (!title) {
                        let name = fileName.replace(/\.md$/, '');
                        name = name.replace(/_[0-9]{4}-[0-9]{2}-[0-9]{2}$/, '');
                        name = name.replace(/[-_]/g, ' ');
                        title = name;
                    }

                    const dateInfo = formatDateFromFilename(fileName);
                    const tags = parseTagsFromMarkdown(md);
                    const cleanedMd = stripTagLine(md);
                    const featuredImage = extractFirstImage(cleanedMd, fileName);
                    const contentMd = featuredImage
                        ? cleanedMd.replace(featuredImage.raw, '').trim()
                        : cleanedMd;
                    const html = await renderMarkdown(contentMd, fileName);

                    return {
                        fileName,
                        title,
                        date: dateInfo.display,
                        isoDate: dateInfo.isoDate,
                        timestamp: dateInfo.timestamp,
                        html,
                        tags,
                        featuredImage
                    };
                }

                async function fetchPosts() {
                    const listUrl = getDocUrl('list.txt');
                    let fileNames = [];

                    try {
                        const text = await fetchText(listUrl, '未找到 docs/list.txt，请创建该文件并填入 .md 文件名');

                        fileNames = text
                            .split(/\r?\n/)
                            .map(line => line.trim().replace(/^\.\//, ''))
                            .filter(line => line.length > 0 && line.endsWith('.md'));

                        if (fileNames.length === 0) {
                            throw new Error('list.txt 中没有 .md 文件');
                        }
                    } catch (err) {
                        throw new Error(`读取列表失败: ${err.message}`);
                    }

                    const results = await Promise.allSettled(
                        fileNames.map(fileName => loadMarkdownAndRender(fileName))
                    );

                    const loadedPosts = [];

                    for (let i = 0; i < results.length; i++) {
                        const r = results[i];

                        if (r.status === 'fulfilled') {
                            loadedPosts.push(r.value);
                        } else {
                            console.warn(`跳过文件 ${fileNames[i]}:`, r.reason);
                        }
                    }

                    if (loadedPosts.length === 0) {
                        throw new Error('没有成功加载任何文章，请检查 .md 文件是否存在');
                    }

                    loadedPosts.sort((a, b) => b.timestamp - a.timestamp);
                    return loadedPosts;
                }

                const sortedTagsWithCount = computed(() => {
                    const tagMap = {};

                    posts.value.forEach(p => {
                        if (p.tags) {
                            p.tags.forEach(t => {
                                if (!tagMap[t]) {
                                    tagMap[t] = {
                                        name: t,
                                        count: 0,
                                        latestTimestamp: 0
                                    };
                                }

                                tagMap[t].count++;

                                if (p.timestamp && p.timestamp > tagMap[t].latestTimestamp) {
                                    tagMap[t].latestTimestamp = p.timestamp;
                                }
                            });
                        }
                    });

                    return Object.values(tagMap).sort((a, b) => {
                        if (b.latestTimestamp !== a.latestTimestamp) {
                            return b.latestTimestamp - a.latestTimestamp;
                        }

                        return a.name.localeCompare(b.name);
                    });
                });

                const filteredPosts = computed(() => {
                    let result = posts.value;

                    if (selectedTag.value) {
                        result = result.filter(p => p.tags && p.tags.includes(selectedTag.value));
                    }

                    const q = searchQuery.value.trim().toLowerCase();

                    if (q) {
                        result = result.filter(p => {
                            const titleMatch = p.title.toLowerCase().includes(q);
                            const tagMatch = p.tags
                                ? p.tags.some(t => t.toLowerCase().includes(q))
                                : false;

                            return titleMatch || tagMatch;
                        });
                    }

                    return result;
                });

                const totalPages = computed(() => {
                    return Math.ceil(filteredPosts.value.length / postsPerPage) || 1;
                });

                const paginatedPosts = computed(() => {
                    const start = (currentPage.value - 1) * postsPerPage;
                    return filteredPosts.value.slice(start, start + postsPerPage);
                });

                const visiblePages = computed(() => {
                    const total = totalPages.value;
                    const current = currentPage.value;
                    const maxVisible = 5;

                    let start = Math.max(1, current - Math.floor(maxVisible / 2));
                    let end = Math.min(total, start + maxVisible - 1);

                    if (end - start + 1 < maxVisible) {
                        start = Math.max(1, end - maxVisible + 1);
                    }

                    return Array.from({ length: end - start + 1 }, (_, i) => start + i);
                });

                const friendRows = computed(() => splitFriendRows(friends.value));

                function highlightCode() {
                    if (typeof hljs !== 'undefined') {
                        document.querySelectorAll('.article-body pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                    }
                }

                async function openPost(post) {
                    activePost.value = post;
                    await nextTick();
                    highlightCode();
                    document.getElementById('reader')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

                async function closePost() {
                    activePost.value = null;
                    await nextTick();
                    document.getElementById('journal')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

                function scrollTags(direction) {
                    const el = tagScroller.value;
                    if (!el) return;

                    const distance = Math.max(220, Math.floor(el.clientWidth * 0.72));
                    el.scrollBy({
                        left: direction * distance,
                        behavior: 'smooth'
                    });
                }

                function selectTag(tag) {
                    selectedTag.value = selectedTag.value === tag ? null : tag;
                    currentPage.value = 1;
                }

                function handleImageClick(e) {
                    const target = e.target;

                    if (target.tagName === 'IMG' && (target.closest('.article-body') || target.classList.contains('featured-image'))) {
                        lightboxImg.value = target.src;
                    }
                }

                watch([selectedTag, searchQuery], () => {
                    currentPage.value = 1;
                });

                watch(totalPages, () => {
                    if (currentPage.value > totalPages.value) {
                        currentPage.value = totalPages.value;
                    }
                });

                onMounted(async () => {
                    if (typeof marked === 'undefined') {
                        error.value = 'Markdown 解析库加载失败，请刷新页面重试';
                        loading.value = false;
                        return;
                    }

                    try {
                        const [loadedPosts, loadedFriends] = await Promise.all([
                            fetchPosts(),
                            fetchFriends()
                        ]);
                        posts.value = loadedPosts;
                        friends.value = loadedFriends;
                    } catch (err) {
                        error.value = err.message || '加载文章失败，请确保 docs 目录和 list.txt 配置正确';
                    } finally {
                        loading.value = false;
                        document.addEventListener('click', handleImageClick);
                    }
                });

                return {
                    loading,
                    error,
                    posts,
                    friends,
                    searchQuery,
                    selectedTag,
                    currentPage,
                    activePost,
                    lightboxImg,
                    tagScroller,
                    sortedTagsWithCount,
                    filteredPosts,
                    totalPages,
                    paginatedPosts,
                    visiblePages,
                    friendRows,
                    selectTag,
                    scrollTags,
                    openPost,
                    closePost
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
